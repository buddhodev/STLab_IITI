name: Deploy Portal to IIT Indore Server

on:
  push:
    branches:
      - main # Automatically runs every time someone saves an update to the main branch

jobs:
  deploy-to-iiti:
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch the source code from your GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the latest Node.js environment to match GitHub's runners
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Locate the project folder, install tools, and compile the build
      - name: Install & Compile Frontend
        run: |
          # Dynamically locate the directory containing your package.json file
          TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Target directory locked: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Install dependencies and handle potential version conflicts cleanly
          npm install --legacy-peer-deps
          npm install laravel-vite-plugin @tailwindcss/vite --save-dev --legacy-peer-deps
          
          # Compile the static production assets (creates the 'dist' folder)
          npx vite build
          
          # Move the compiled files to a clean, predictable root folder for deployment
          mkdir -p ../dist-deploy
          cp -r dist/* ../dist-deploy/

      # 4. Sync the compiled 'dist' files securely to the IITI Server via Port 22
      - name: SFTP Deploy to CITC Infrastructure
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IITI_HOST }}
          username: ${{ secrets.IITI_USERNAME }}
          password: ${{ secrets.IITI_PASSWORD }}
          port: 22
          local-dir: ./dist-deploy/
          server-dir: /home/iiti-stlab/htdocs/stlab.iiti.ac.in/
