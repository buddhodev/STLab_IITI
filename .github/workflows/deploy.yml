name: Deploy Portal to IIT Indore Server

on:
  push:
    branches:
      - main

jobs:
  deploy-to-iiti:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Uses Node 24 directly to match modern specifications
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Compile Frontend
        run: |
          TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Target directory locked: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Run clean installation with legacy peer support to ignore version warnings
          npm install --legacy-peer-deps
          npm install laravel-vite-plugin @tailwindcss/vite --save-dev --legacy-peer-deps
          
          # Run build with full error printouts enabled
          npx vite build --debug
