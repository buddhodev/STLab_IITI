name: Deploy Portal to IIT Indore Server

on:
  push:
    branches:
      - main # Triggers the automation every time you save to the main branch

jobs:
  deploy-to-iiti:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the fresh code from your GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Build the Node environment for compilation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Dynamically find your subfolder and compile the assets
      - name: Install & Compile Frontend
        run: |
          # This line automatically finds the folder containing your package.json
          TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \;)
          echo "Target directory detected: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Force install Vite and build plugins directly into the active folder
          npm install laravel-vite-plugin @tailwindcss/vite --save-dev
          npm install
          npx vite build

      # 4. Sync the files securely to the IITI Server via Port 3004
      - name: SFTP Deploy to CITC Infrastructure
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IITI_HOST }}
          username: ${{ secrets.IITI_USERNAME }}
          password: ${{ secrets.IITI_PASSWORD }}
          port: 3004
          local-dir: ./
          server-dir: ./ # Maps directly to your assigned hosting space root
